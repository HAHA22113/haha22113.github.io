<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<style type="text/css">

</style>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.0/jquery.min.js"></script>
</head>
<body>
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPBL 韓籍啦啦隊女神二選一 - 延長加塞版</title>
    <style>
        /* 網頁整體樣式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
            color: #333;
        }

        /* 遊戲容器 */
        .container {
            background-color: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 90%;
            max-width: 800px;
            margin: 20px auto;
        }

        /* 標題 */
        h1 {
            color: #d90429; /* 鮮紅色 */
            margin-bottom: 5px;
            font-size: 2em;
        }
        h2 {
            color: #555;
            margin-top: 5px;
            font-size: 1.2em;
        }

        /* 選項按鈕區塊 */
        .choice-container {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-top: 30px;
        }

        /* 單一選項卡片 */
        .choice-card {
            flex: 1;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 3px solid transparent;
        }

        /* 選項卡片顏色 */
        #choiceA { background-color: #ffe8d6; } /* 淺橘色 */
        #choiceB { background-color: #d8f3dc; } /* 淺綠色 */
        #tbChoiceA { background-color: #ffe8d6; }
        #tbChoiceB { background-color: #d8f3dc; }

        /* 滑鼠懸停效果 */
        .choice-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        /* 選擇後的邊框效果 */
        .choice-card:hover:active {
            border: 3px solid #d90429;
            transform: scale(0.98);
        }
        
        /* 隊伍名稱 */
        .team {
            font-size: 0.9em;
            color: #777;
            margin-top: 5px;
        }
        
        /* 姓名 */
        .name {
            font-size: 1.8em;
            font-weight: bold;
            color: #1b4965; /* 深藍色 */
        }
        
        /* 提示文字 */
        .prompt {
            margin-bottom: 20px;
            font-size: 1.1em;
            color: #555;
        }

        /* 統計區 */
        .stats {
            margin-top: 40px;
            padding: 10px 20px;
            background-color: #eaf4f4;
            border-radius: 8px;
        }
        
        /* 遊戲/延長賽標題 */
        .screen-title {
            color: #d90429; 
            font-weight: bold;
        }
        
        /* 遊戲結束訊息 */
        .end-message {
            margin-top: 30px;
            font-size: 1.5em;
            color: #d90429;
            font-weight: bold;
        }
        
        /* 重新開始按鈕 */
        .restart-button {
            padding: 10px 20px;
            font-size: 1.1em;
            cursor: pointer;
            background-color: #d90429;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
            transition: background-color 0.3s;
        }

        .restart-button:hover {
            background-color: #a5001a;
        }
        
        /* 排名表格樣式 */
        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            text-align: left;
        }

        .ranking-table th, .ranking-table td {
            border: 1px solid #ddd;
            padding: 12px;
        }

        .ranking-table th {
            background-color: #1b4965;
            color: white;
            text-align: center;
        }

        .ranking-table tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        .ranking-table tr:hover {
            background-color: #e0e0e0;
        }

        .rank-number {
            font-weight: bold;
            width: 50px;
            text-align: center;
        }
        
        .score-number {
            text-align: center;
            font-weight: bold;
            color: #d90429;
        }
        
        /* 皇冠圖示 */
        .crown {
            color: gold;
            margin-right: 5px;
        }

    </style>
</head>
<body>

<div class="container">
    
    <div id="gameScreen">
        <h1>👑 CPBL 韓籍啦啦隊女神二選一</h1>
        <h2>點擊您更喜歡的一位累積積分！</h2>
        <p class="prompt">點擊卡片進行選擇：</p>

        <div class="choice-container">
            <div id="choiceA" class="choice-card" onclick="selectChoice(0)">
                <div class="name">姓名 A</div>
                <div class="team">隊伍 A</div>
            </div>
            <div id="choiceB" class="choice-card" onclick="selectChoice(1)">
                <div class="name">姓名 B</div>
                <div class="team">隊伍 B</div>
            </div>
        </div>

        <div class="stats">
            <p>已完成：<span id="completedCount">0</span> 局 / 總局數：<span id="totalRounds">0</span></p>
        </div>
    </div>
    
    <div id="tieBreakerScreen" style="display: none;">
        <h1 class="screen-title">🚨 延長加塞！平手對決</h1>
        <h2>主遊戲得分為 <span id="tbScore" class="screen-title"></span> 分的 <span id="tbGroupSize" class="screen-title"></span> 位女神進入延長賽！</h2>
        <p class="prompt">請再次點擊您更喜歡的一位，以決定最終排名。</p>

        <div class="choice-container">
            <div id="tbChoiceA" class="choice-card" onclick="selectTieBreakerChoice(0)">
                <div class="name">加賽 A</div>
                <div class="team">隊伍 A</div>
            </div>
            <div id="tbChoiceB" class="choice-card" onclick="selectTieBreakerChoice(1)">
                <div class="name">加賽 B</div>
                <div class="team">隊伍 B</div>
            </div>
        </div>

        <div class="stats">
            <p>已完成：<span id="tbCompletedCount">0</span> 局 / 總局數：<span id="tbTotalRounds">0</span></p>
            <p style="font-size:0.9em; color:#999;">（延長賽輪次為隨機配對，目的是打破平局）</p>
        </div>
    </div>

    <div id="resultScreen" style="display: none;">
        <h1 class="end-message" style="display: block;">🎉 遊戲結束！人氣女神最終排名</h1>
        <table id="rankingTable" class="ranking-table">
            </table>
        <button id="restartButton" class="restart-button" onclick="startGame()">重新開始</button>
    </div>
</div>

<script>
    // **可調整參數**
    // 1. 每位啦啦隊員在主遊戲中至少會被隨機選為對手幾次。
    const MAIN_APPEARANCE_TIMES = 3; 
    // 2. 延長賽中，每位平手隊員至少會被隨機選為對手幾次。
    const TB_APPEARANCE_TIMES = 2; 

    // 啦啦隊名單（使用最新統整名單）
    const initialCheerleaders = [
        { name: "李多慧", team: "味全龍" },
        { name: "權喜原", team: "味全龍" },
        { name: "金娜妍", team: "味全龍" },
        { name: "安芝儇", team: "台鋼雄鷹" },
        { name: "朴旻曙", team: "台鋼雄鷹" },
        { name: "河智媛", team: "樂天桃猿" },
        { name: "禹洙漢", team: "樂天桃猿" },
        { name: "廉世彬", team: "樂天桃猿" },
        { name: "邊荷律", team: "中信兄弟" },
        { name: "李丹妃", team: "中信兄弟" },
        { name: "朴善珠", team: "中信兄弟" },
        { name: "金渡兒", team: "中信兄弟" },
        { name: "李雅英", team: "富邦悍將" },
        { name: "李珠珢", team: "富邦悍將" },
        { name: "南珉貞", team: "富邦悍將" },
        { name: "李晧禎", team: "富邦悍將" },
        { name: "趙娟週", team: "統一獅" },
        { name: "文慧真", team: "統一獅" },
        { name: "安惠志", team: "統一獅" }
    ];

    let cheerleaders = []; // 用於計分的隊員列表
    let mainRounds = []; // 儲存主遊戲回合
    let currentMainRoundIndex = 0;
    let totalMainRounds = 0;
    
    let gameState = 'main'; // 'main', 'tiebreaker', 'finished'
    let tiedGroups = []; // 儲存所有需要加賽的群組
    let currentTiedGroupIndex = 0;
    let tieBreakerRounds = []; // 儲存當前加賽群組的回合
    let currentTieBreakerRoundIndex = 0;
    
    // DOM 元素快取 (主遊戲)
    const gameScreen = document.getElementById('gameScreen');
    const choiceA = document.getElementById('choiceA');
    const choiceB = document.getElementById('choiceB');
    const completedCount = document.getElementById('completedCount');
    const totalRoundsSpan = document.getElementById('totalRounds');
    
    // DOM 元素快取 (延長賽)
    const tieBreakerScreen = document.getElementById('tieBreakerScreen');
    const tbChoiceA = document.getElementById('tbChoiceA');
    const tbChoiceB = document.getElementById('tbChoiceB');
    const tbCompletedCount = document.getElementById('tbCompletedCount');
    const tbTotalRoundsSpan = document.getElementById('tbTotalRounds');
    
    // DOM 元素快取 (結果)
    const resultScreen = document.getElementById('resultScreen');
    const rankingTable = document.getElementById('rankingTable');


    /** 洗牌算法 */
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    /** 生成主遊戲回合組合 */
    function generateMainRounds() {
        // 1. 初始化計分和出現次數
        cheerleaders = initialCheerleaders.map(c => ({
            ...c,
            score: 0,
            tieBreakerScore: 0, // 新增延長賽得分
            appearancesLeft: MAIN_APPEARANCE_TIMES 
        }));
        
        mainRounds = [];
        totalMainRounds = cheerleaders.length * MAIN_APPEARANCE_TIMES; 
        totalRoundsSpan.textContent = totalMainRounds;

        // 2. 生成回合（與短版邏輯相同）
        while (mainRounds.length < totalMainRounds) {
            let availablePlayers = cheerleaders.filter(c => c.appearancesLeft > 0);
            
            if (availablePlayers.length < 2) break;

            shuffle(availablePlayers);
            let c1 = availablePlayers[0];
            let c2 = availablePlayers[1];

            if (c1.name === c2.name) continue; 
            
            if (c1.appearancesLeft < c2.appearancesLeft) {
                [c1, c2] = [c2, c1]; 
            }

            const round = [c1, c2];
            if (Math.random() < 0.5) {
                [round[0], round[1]] = [round[1], round[0]];
            }
            mainRounds.push(round);

            c1.appearancesLeft--;
            c2.appearancesLeft--;

            if (mainRounds.length === totalMainRounds) break;
        }

        totalMainRounds = mainRounds.length;
        totalRoundsSpan.textContent = totalMainRounds;
        shuffle(mainRounds); 
    }

    /** 顯示當前主遊戲回合的選項 */
    function displayCurrentMainRound() {
        if (currentMainRoundIndex >= totalMainRounds) {
            endMainGame();
            return;
        }

        const [cheerleaderA, cheerleaderB] = mainRounds[currentMainRoundIndex];

        choiceA.querySelector('.name').textContent = cheerleaderA.name;
        choiceA.querySelector('.team').textContent = cheerleaderA.team;
        
        choiceB.querySelector('.name').textContent = cheerleaderB.name;
        choiceB.querySelector('.team').textContent = cheerleaderB.team;

        completedCount.textContent = currentMainRoundIndex;
    }

    /** 處理主遊戲選擇 */
    function selectChoice(selectedIndex) {
        if (gameState !== 'main') return;

        const selectedCheerleader = mainRounds[currentMainRoundIndex][selectedIndex];
        
        // 找到名單中的對應對象並計分
        const indexInCheerleaders = cheerleaders.findIndex(c => c.name === selectedCheerleader.name);
        if (indexInCheerleaders !== -1) {
            cheerleaders[indexInCheerleaders].score++;
        }

        currentMainRoundIndex++;
        displayCurrentMainRound();
    }

    /** 1. 檢查並分組平手群組 */
    function findTiedGroups() {
        // 1. Sort by score
        const sorted = [...cheerleaders].sort((a, b) => b.score - a.score);
        const groups = [];

        // 2. Group by score
        for (let i = 0; i < sorted.length; i++) {
            const player = sorted[i];
            const lastGroup = groups[groups.length - 1];

            if (lastGroup && lastGroup.score === player.score) {
                lastGroup.players.push(player);
            } else {
                groups.push({ score: player.score, players: [player] });
            }
        }

        // 3. Filter for groups with more than 1 player (i.e., ties)
        return groups.filter(g => g.players.length > 1);
    }

    /** 2. 主遊戲結束，檢查是否需要延長賽 */
    function endMainGame() {
        completedCount.textContent = totalMainRounds; 
        
        tiedGroups = findTiedGroups();

        if (tiedGroups.length > 0) {
            // 找到平手群組，開始延長賽
            currentTiedGroupIndex = 0;
            startTieBreakerForGroup(tiedGroups[currentTiedGroupIndex]);
        } else {
            // 無平手，直接顯示最終排名
            showFinalRanking();
        }
    }

    // --- 延長賽邏輯 ---

    /** 3. 生成當前群組的延長賽回合 */
    function generateTieBreakerPairings(group) {
        const players = group.players;
        const tbRounds = [];

        // 重置延長賽得分和出現次數
        players.forEach(p => {
            p.tieBreakerScore = 0;
            p.tbAppearancesLeft = TB_APPEARANCE_TIMES;
        });

        let maxRounds = players.length * TB_APPEARANCE_TIMES;
        
        // 創建配對
        while (tbRounds.length < maxRounds) {
            let availablePlayers = players.filter(p => p.tbAppearancesLeft > 0);
            
            if (availablePlayers.length < 2) break;

            shuffle(availablePlayers);
            let p1 = availablePlayers[0];
            let p2 = availablePlayers[1];

            if (p1.name === p2.name) continue; 
            
            if (p1.tbAppearancesLeft < p2.tbAppearancesLeft) {
                [p1, p2] = [p2, p1];
            }

            const round = [p1, p2];
            if (Math.random() < 0.5) {
                [round[0], round[1]] = [round[1], round[0]];
            }
            tbRounds.push(round);
            
            p1.tbAppearancesLeft--;
            p2.tbAppearancesLeft--;
        }
        
        shuffle(tbRounds);
        return tbRounds;
    }

    /** 4. 顯示當前群組的延長賽畫面 */
    function startTieBreakerForGroup(group) {
        gameState = 'tiebreaker';
        
        gameScreen.style.display = 'none';
        resultScreen.style.display = 'none';
        tieBreakerScreen.style.display = 'block';

        tieBreakerRounds = generateTieBreakerPairings(group);
        currentTieBreakerRoundIndex = 0;
        
        document.getElementById('tbScore').textContent = group.score;
        document.getElementById('tbGroupSize').textContent = group.players.length;
        tbCompletedCount.textContent = 0;
        tbTotalRoundsSpan.textContent = tieBreakerRounds.length;
        
        displayCurrentTieBreakerRound();
    }

    /** 5. 顯示當前延長賽回合的選項 */
    function displayCurrentTieBreakerRound() {
        if (currentTieBreakerRoundIndex >= tieBreakerRounds.length) {
            resolveCurrentTieGroup();
            return;
        }

        const [cheerleaderA, cheerleaderB] = tieBreakerRounds[currentTieBreakerRoundIndex];
        
        tbChoiceA.querySelector('.name').textContent = cheerleaderA.name;
        tbChoiceA.querySelector('.team').textContent = cheerleaderA.team;
        tbChoiceB.querySelector('.name').textContent = cheerleaderB.name;
        tbChoiceB.querySelector('.team').textContent = cheerleaderB.team;

        tbCompletedCount.textContent = currentTieBreakerRoundIndex;
    }

    /** 6. 處理延長賽選擇 */
    function selectTieBreakerChoice(selectedIndex) {
        if (gameState !== 'tiebreaker') return;
        
        const currentGroup = tiedGroups[currentTiedGroupIndex];
        const selectedCheerleader = tieBreakerRounds[currentTieBreakerRoundIndex][selectedIndex];
        
        // 僅更新 tieBreakerScore
        const player = cheerleaders.find(c => c.name === selectedCheerleader.name);
        if (player) {
            player.tieBreakerScore++;
        }

        currentTieBreakerRoundIndex++;
        displayCurrentTieBreakerRound();
    }

    /** 7. 結束當前群組的延長賽並移至下一個群組或最終排名 */
    function resolveCurrentTieGroup() {
        currentTiedGroupIndex++;
        if (currentTiedGroupIndex < tiedGroups.length) {
            // 移到下一個平手群組
            startTieBreakerForGroup(tiedGroups[currentTiedGroupIndex]);
        } else {
            // 所有平手群組皆已解決，顯示最終排名
            showFinalRanking();
        }
    }

    // --- 最終排名邏輯 ---
    
    /** 8. 顯示最終排名 */
    function showFinalRanking() {
        gameState = 'finished';

        // 1. 最終排序邏輯:
        //    - 主要依據: score (主遊戲得分)
        //    - 次要依據: tieBreakerScore (延長賽得分)
        const finalRankedList = [...cheerleaders].sort((a, b) => {
            // 先比較主遊戲得分
            if (b.score !== a.score) {
                return b.score - a.score;
            }
            // 主遊戲得分相等時，比較延長賽得分
            return b.tieBreakerScore - a.tieBreakerScore;
        });

        // 2. 確保所有畫面都隱藏，只顯示結果畫面
        gameScreen.style.display = 'none';
        tieBreakerScreen.style.display = 'none';
        resultScreen.style.display = 'block';

        // 3. 填入新排名數據 (與舊版相同)
        rankingTable.innerHTML = `
            <tr>
                <th class="rank-number">排名</th>
                <th>姓名</th>
                <th>所屬隊伍</th>
                <th class="score-number">主遊戲得分</th>
                <th class="score-number">延長賽得分</th>
            </tr>
        `;

        finalRankedList.forEach((c, index) => {
            const rank = index + 1;
            const rankText = (rank <= 3) ? `<span class="crown">👑</span>${rank}` : rank;
            
            const row = rankingTable.insertRow();
            row.innerHTML = `
                <td class="rank-number">${rankText}</td>
                <td>${c.name}</td>
                <td>${c.team}</td>
                <td class="score-number">${c.score}</td>
                <td class="score-number">${c.tieBreakerScore > 0 ? c.tieBreakerScore : '-'}</td>
            `;
        });
    }

    /** 9. 開始或重新開始遊戲 */
    function startGame() {
        gameState = 'main';
        currentMainRoundIndex = 0;
        tiedGroups = [];
        currentTiedGroupIndex = 0;

        generateMainRounds();
        displayCurrentMainRound();
        
        // 切換到主遊戲畫面
        gameScreen.style.display = 'block';
        tieBreakerScreen.style.display = 'none';
        resultScreen.style.display = 'none';
    }

    // 頁面載入時啟動遊戲
    window.onload = startGame;
</script>

</body>
</html>
<script>

</script>
</body>
</html>
