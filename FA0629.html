<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fubon Angels 遠端暗號猜女孩 (27人官方同步精確版)</title>
    <style>
        :root {
            --fubon-blue: #003153;
            --fubon-aqua: #00A3E0;
            --fubon-gold: #C5A059;
            --white: #ffffff;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            color: var(--fubon-blue);
        }

        h1 {
            margin: 0;
            font-size: 2.2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .subtitle {
            font-size: 1rem;
            color: #555;
            margin-top: 5px;
        }

        .game-container {
            width: 100%;
            max-width: 900px;
            background: var(--white);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border-top: 6px solid var(--fubon-aqua);
        }

        .mode-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab-btn {
            background: #e2e8f0;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            color: #4a5568;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--fubon-blue);
            color: white;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .btn {
            background-color: var(--fubon-blue);
            color: var(--white);
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn:hover {
            background-color: var(--fubon-aqua);
            transform: translateY(-2px);
        }

        .secret-inputs {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
            margin: 20px auto;
        }

        select {
            padding: 12px;
            font-size: 1.05rem;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            outline: none;
            background-color: #fff;
            cursor: pointer;
            color: #334155;
            transition: border-color 0.2s;
            width: 100%;
        }

        select:focus {
            border-color: var(--fubon-aqua);
        }

        .share-box {
            background: #f7fafc;
            border: 1px dashed var(--fubon-aqua);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .code-display {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 5px;
            color: var(--fubon-aqua);
            margin: 10px 0;
            background: #edf2f7;
            padding: 10px;
            border-radius: 5px;
            display: inline-block;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #edf2f7;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--fubon-blue);
        }

        .feedback-msg {
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            min-height: 35px;
            margin-bottom: 15px;
            color: #e53e3e;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
        }

        .girl-card {
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px 10px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .girl-card:hover {
            transform: scale(1.05);
            border-color: var(--fubon-aqua);
            background-color: #f0f9ff;
        }

        .girl-card.correct {
            background-color: #c6f6d5;
            border-color: #38a169;
            color: #22543d;
            cursor: default;
        }

        .girl-card.wrong {
            background-color: #fed7d7;
            border-color: #e53e3e;
            color: #742a2a;
            opacity: 0.6;
            cursor: default;
        }

        .win-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
        }

        .win-box {
            background: var(--white);
            color: var(--fubon-blue);
            padding: 40px;
            border-radius: 16px;
            max-width: 500px;
            width: 80%;
            text-align: center;
        }

        .win-box h2 {
            font-size: 2.5rem;
            color: #38a169;
            margin-top: 0;
        }
    </style>
</head>
<body>

<header>
    <h1>💙 Fubon Angels 💙</h1>
    <div class="subtitle">2026 最新陣容同步版 (共 27 人) · 遠端暗號連線遊戲</div>
</header>

<div class="game-container">
    <div class="mode-tabs">
        <button class="tab-btn active" id="tab-create" onclick="switchMode('create')">我來出題（產生暗號）</button>
        <button class="tab-btn" id="tab-guess" onclick="switchMode('guess')">我來猜題（輸入暗號）</button>
    </div>
    
    <div id="create-section" class="section active" style="text-align: center;">
        <h3>請選出你心中暗自決定的 1 ~ 3 位女孩：</h3>
        <div class="secret-inputs">
            <select id="pick1"><option value="">-- 選擇第一位女孩 (必選) --</option></select>
            <select id="pick2"><option value="">-- 選擇第二位女孩 (可選) --</option></select>
            <select id="pick3"><option value="">-- 選擇第三位女孩 (可選) --</option></select>
        </div>
        <button class="btn" onclick="generateCode()">產生心靈暗號</button>

        <div class="share-box" id="share-box">
            <p>🎉 暗號已成功產生！請複製下方的【4位數密碼】，傳給你的朋友：</p>
            <div class="code-display" id="code-output">0000</div>
            <p style="font-size: 0.9rem; color: #718096;">朋友收到後，只要打開同一個網頁，切換到「我來猜題」並輸入這組密碼即可遊玩！</p>
        </div>
    </div>

    <div id="guess-section" class="section" style="text-align: center;">
        <div id="code-input-zone">
            <h3>請輸入朋友傳給你的【4位數心靈暗號】：</h3>
            <input type="text" id="game-code-input" placeholder="例如: 8A2F" style="padding: 10px; font-size: 1.3rem; width: 150px; text-align: center; border: 2px solid #ccc; border-radius: 8px; text-transform: uppercase; letter-spacing: 2px;"><br><br>
            <button class="btn" onclick="loadGameFromCode()">破解心靈暗號！</button>
        </div>

        <div id="play-zone" style="display: none; text-align: left; margin-top: 20px;">
            <div class="status-bar">
                <div>目標要猜對：<span id="target-count">0</span> 位</div>
                <div>目前已找到：<span id="found-count">0</span> 位</div>
            </div>
            <div class="feedback-msg" id="feedback">點擊下方的女孩名單開始猜測！</div>
            <div class="grid" id="girls-grid"></div>
        </div>
    </div>

</div>

<div class="win-overlay" id="win-overlay">
    <div class="win-box">
        <h2>🎉 完美通關 🎉</h2>
        <p style="font-size: 1.2rem; margin: 20px 0;">心靈感應成功！你完全看穿了對方的心思！</p>
        <p id="final-girls" style="font-weight: bold; font-size: 1.3rem; color: var(--fubon-aqua);"></p>
        <button class="btn" onclick="location.reload()">再玩一次</button>
    </div>
</div>

<script>
    const officialAngels2026 = [
        "潔米", "慈妹", "丹丹", "秀秀子", "檸檬", 
        "Jessy", "奶昔", "維心", "沁沁", "卡洛琳", 
        "大頭", "栗子", "安娜", "Tiffany", "禾羽", 
        "潔潔", "雅惟", "李雅英", "南珉貞", "李珠珢", 
        "李晧禎", "朴星垠", "陳愉", "呱呱", "小芊", 
        "貝兒", "Laynee"
    ].sort();

    const targetAnswers = new Set();
    let foundAnswers = new Set();

    function initSetup() {
        const selects = [
            document.getElementById('pick1'), 
            document.getElementById('pick2'), 
            document.getElementById('pick3')
        ];
        
        selects.forEach((select, index) => {
            select.innerHTML = '';
            
            const defaultOpt = document.createElement('option');
            defaultOpt.value = "";
            if (index === 0) {
                defaultOpt.textContent = "-- 選擇第一位女孩 (必選) --";
            } else if (index === 1) {
                defaultOpt.textContent = "-- 選擇第二位女孩 (可選) --";
            } else {
                defaultOpt.textContent = "-- 選擇第三位女孩 (可選) --";
            }
            select.appendChild(defaultOpt);

            officialAngels2026.forEach(girl => {
                const opt = document.createElement('option');
                opt.value = girl;
                opt.textContent = girl;
                select.appendChild(opt);
            });
        });
    }

    function switchMode(mode) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        if(mode === 'create') {
            document.getElementById('tab-create').classList.add('active');
            document.getElementById('create-section').classList.add('active');
        } else {
            document.getElementById('tab-guess').classList.add('active');
            document.getElementById('guess-section').classList.add('active');
        }
    }

    function generateCode() {
        const p1 = document.getElementById('pick1').value;
        const p2 = document.getElementById('pick2').value;
        const p3 = document.getElementById('pick3').value;

        if (!p1) { alert("請至少選擇第一位女孩喔！"); return; }

        let idx1 = officialAngels2026.indexOf(p1) + 1; 
        let idx2 = p2 ? officialAngels2026.indexOf(p2) + 1 : 0;
        let idx3 = p3 ? officialAngels2026.indexOf(p3) + 1 : 0;

        // 修改為最安全的 5 位元間隔移位 (10, 5, 0)
        let combined = (idx1 << 10) | (idx2 << 5) | idx3;
        let code = combined.toString(16).toUpperCase().padStart(4, '0');
        
        document.getElementById('code-output').textContent = code;
        document.getElementById('share-box').style.display = 'block';
    }

    function loadGameFromCode() {
        const codeInput = document.getElementById('game-code-input').value.trim().toUpperCase();
        if(codeInput.length !== 4) { alert("請輸入正確的 4 位數暗號！"); return; }

        let combined = parseInt(codeInput, 16);
        if (isNaN(combined)) { alert("暗號格式錯誤！"); return; }

        // 解密遮罩同步對應 5 位元長度 (0x1F 即二進位的 11111)
        let idx1 = (combined >> 10) & 0x1F;
        let idx2 = (combined >> 5) & 0x1F;
        let idx3 = combined & 0x1F;

        targetAnswers.clear();
        foundAnswers.clear();

        if (idx1 > 0 && idx1 <= officialAngels2026.length) targetAnswers.add(officialAngels2026[idx1 - 1]);
        if (idx2 > 0 && idx2 <= officialAngels2026.length) targetAnswers.add(officialAngels2026[idx2 - 1]);
        if (idx3 > 0 && idx3 <= officialAngels2026.length) targetAnswers.add(officialAngels2026[idx3 - 1]);

        if (targetAnswers.size === 0) { alert("無效的解密暗號，請確認後再輸入！"); return; }

        document.getElementById('code-input-zone').style.display = 'none';
        document.getElementById('play-zone').style.display = 'block';

        document.getElementById('target-count').textContent = targetAnswers.size;
        document.getElementById('found-count').textContent = 0;
        
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('girls-grid');
        grid.innerHTML = '';

        officialAngels2026.forEach(girl => {
            const card = document.createElement('div');
            card.className = 'girl-card';
            card.textContent = girl;
            
            card.onclick = function() {
                if (card.classList.contains('correct') || card.classList.contains('wrong')) return;

                if (targetAnswers.has(girl)) {
                    card.classList.add('correct');
                    foundAnswers.add(girl);
                    document.getElementById('found-count').textContent = foundAnswers.size;
                    
                    const feedback = document.getElementById('feedback');
                    feedback.textContent = `⭕ 猜對了！「${girl}」就在名單中！`;
                    feedback.style.color = "#38a169";

                    if (foundAnswers.size === targetAnswers.size) {
                        setTimeout(showWinOverlay, 600);
                    }
                } else {
                    card.classList.add('wrong');
                    const feedback = document.getElementById('feedback');
                    feedback.textContent = `❌ 糟糕！對方心中沒有「${girl}」喔！`;
                    feedback.style.color = "#e53e3e";
                }
            };
            grid.appendChild(card);
        });
    }

    function showWinOverlay() {
        const arr = Array.from(targetAnswers);
        document.getElementById('final-girls').textContent = "心中的女孩： " + arr.join(' ❤️ ');
        document.getElementById('win-overlay').style.display = 'flex';
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initSetup);
    } else {
        initSetup();
    }
</script>
</body>
</html>
